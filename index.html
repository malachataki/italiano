<html lang="el">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ιταλικό Λεξιλόγιο</title>
  <meta name="description" content="Εξάσκηση ιταλικού λεξιλογίου με ελληνική μετάφραση" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#533fb7" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Italiano" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #ffffff; --bg2: #f5f5f3; --bg3: #ededea;
      --text: #1a1a18; --text2: #6b6b67;
      --border: rgba(0,0,0,0.1); --border2: rgba(0,0,0,0.2);
      --accent: #533fb7; --accent-light: #eeedfe;
      --green-bg: #e1f5ee; --green-text: #085041; --green-border: #1D9E75;
      --red-bg: #fcebeb; --red-text: #501313; --red-border: #e24b4a;
      --radius: 8px; --radius-lg: 12px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1c1c1a; --bg2: #252523; --bg3: #2f2f2c;
        --text: #f0ede8; --text2: #9a9a94;
        --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.18);
        --accent-light: #26215c;
        --green-bg: #04342c; --green-text: #9fe1cb;
        --red-bg: #501313; --red-text: #f7c1c1;
      }
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg2); color: var(--text); min-height: 100vh; }

    /* HEADER */
    header { background: var(--bg); border-bottom: 0.5px solid var(--border2); padding: 12px 16px; position: sticky; top: 0; z-index: 20; display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    header h1 { font-size: 16px; font-weight: 600; white-space: nowrap; }
    .score-pills { display: flex; gap: 6px; flex-shrink: 0; }
    .pill { font-size: 12px; padding: 3px 10px; border-radius: 999px; border: 0.5px solid var(--border2); color: var(--text2); background: var(--bg2); white-space: nowrap; }
    .pill b { color: var(--text); }
    .pill.green { background: var(--green-bg); color: var(--green-text); border-color: var(--green-border); }
    .pill.red { background: var(--red-bg); color: var(--red-text); border-color: var(--red-border); }

    /* TABS */
    .tabs { display: flex; background: var(--bg); border-bottom: 0.5px solid var(--border2); }
    .tab-btn { flex: 1; padding: 10px 0; font-size: 13px; font-weight: 500; border: none; background: none; color: var(--text2); cursor: pointer; border-bottom: 2px solid transparent; }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* TOOLBAR */
    .toolbar { background: var(--bg); border-bottom: 0.5px solid var(--border); padding: 10px 12px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .toolbar-btn { font-size: 12px; padding: 5px 12px; border-radius: 999px; border: 0.5px solid var(--border2); background: var(--bg2); color: var(--text2); cursor: pointer; white-space: nowrap; }
    .toolbar-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .toolbar-sep { flex: 1; }
    .btn-reset { font-size: 12px; padding: 5px 12px; border-radius: 999px; border: 0.5px solid var(--red-border); color: var(--red-border); background: none; cursor: pointer; white-space: nowrap; }

    /* PAGE */
    .page { display: none; }
    .page.active { display: block; }

    /* QUIZ TABLE */
    .table-wrap { overflow-x: auto; }
    table.quiz-tbl { width: 100%; border-collapse: collapse; font-size: 14px; }
    table.quiz-tbl th { background: var(--bg); position: sticky; top: 0; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .4px; color: var(--text2); padding: 8px 10px; border-bottom: 1px solid var(--border2); text-align: left; z-index: 5; }
    table.quiz-tbl td { padding: 4px 6px; border-bottom: 0.5px solid var(--border); vertical-align: middle; }
    table.quiz-tbl tr:hover td { background: var(--bg3); }
    .it-word { font-weight: 500; color: var(--text); padding: 6px 10px; }
    .answer-inp {
      width: 100%; font-size: 14px; padding: 5px 8px;
      border: 1px solid transparent; border-radius: var(--radius);
      background: transparent; color: var(--text); outline: none;
    }
    .answer-inp:focus { border-color: var(--accent); background: var(--bg); }
    .answer-inp.correct { background: var(--green-bg); color: var(--green-text); border-color: var(--green-border); }
    .answer-inp.wrong { background: var(--red-bg); color: var(--red-text); border-color: var(--red-border); }
    .check-cell { width: 36px; text-align: center; font-size: 16px; }
    .row-num { width: 32px; font-size: 11px; color: var(--text2); text-align: center; }

    /* BOTTOM BAR */
    .bottom-bar { position: sticky; bottom: 0; background: var(--bg); border-top: 0.5px solid var(--border2); padding: 10px 16px; display: flex; gap: 10px; align-items: center; justify-content: space-between; }
    .btn-check-all { flex: 1; padding: 10px; font-size: 14px; font-weight: 600; background: var(--accent); color: #fff; border: none; border-radius: var(--radius); cursor: pointer; }
    .btn-check-all:active { opacity: .85; }

    /* VOCAB PAGE */
    .vocab-search { padding: 10px 12px; background: var(--bg); border-bottom: 0.5px solid var(--border); }
    .vocab-search input { width: 100%; font-size: 14px; padding: 8px 12px; border: 1px solid var(--border2); border-radius: var(--radius); background: var(--bg2); color: var(--text); outline: none; }
    .vocab-search input:focus { border-color: var(--accent); }
    table.vocab-tbl { width: 100%; border-collapse: collapse; font-size: 14px; }
    table.vocab-tbl th { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .4px; color: var(--text2); padding: 8px 12px; border-bottom: 1px solid var(--border2); text-align: left; background: var(--bg); position: sticky; top: 0; }
    table.vocab-tbl td { padding: 9px 12px; border-bottom: 0.5px solid var(--border); }

    /* STATS PAGE */
    .stats-wrap { padding: 14px; }
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
    .stat-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 14px; text-align: center; }
    .stat-card .val { font-size: 28px; font-weight: 700; color: var(--accent); }
    .stat-card .lbl { font-size: 12px; color: var(--text2); margin-top: 4px; }
    .hist-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 14px; }
    .hist-card h3 { font-size: 13px; font-weight: 600; color: var(--text2); margin-bottom: 12px; }
    .hist-list { list-style: none; }
    .hist-list li { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 0.5px solid var(--border); font-size: 13px; }
    .hist-list li:last-child { border-bottom: none; }
    .hist-date { color: var(--text2); font-size: 12px; }
    .pct-badge { font-size: 12px; padding: 2px 10px; border-radius: 999px; background: var(--accent-light); color: var(--accent); font-weight: 600; }
  </style>
</head>
<body>

<header>
  <h1>🇮🇹 Ιταλικό Λεξιλόγιο</h1>
  <div class="score-pills">
    <div class="pill green">✓ <b id="hdr-ok">0</b></div>
    <div class="pill red">✗ <b id="hdr-ko">0</b></div>
    <div class="pill"><b id="hdr-pct">—</b></div>
  </div>
</header>

<div class="tabs">
  <button class="tab-btn active" onclick="showPage('quiz')">Άσκηση</button>
  <button class="tab-btn" onclick="showPage('vocab')">Λεξιλόγιο</button>
  <button class="tab-btn" onclick="showPage('stats')">Στατιστικά</button>
</div>

<!-- QUIZ PAGE -->
<div id="page-quiz" class="page active">
  <div class="toolbar">
    <button class="toolbar-btn active" id="dir-gr" onclick="setDir('gr')">🇮🇹→🇬🇷 Ελληνικά</button>
    <button class="toolbar-btn" id="dir-it" onclick="setDir('it')">🇬🇷→🇮🇹 Ιταλικά</button>
    <div class="toolbar-sep"></div>
    <button class="btn-reset" onclick="resetQuiz()">↺ Καθαρισμός</button>
  </div>
  <div class="table-wrap">
    <table class="quiz-tbl">
      <thead><tr>
        <th class="row-num">#</th>
        <th id="col-q">Ιταλικά</th>
        <th id="col-a">Απάντηση (Ελληνικά)</th>
        <th style="width:36px"></th>
      </tr></thead>
      <tbody id="quiz-body"></tbody>
    </table>
  </div>
  <div class="bottom-bar">
    <div style="font-size:13px;color:var(--text2);" id="bottom-info">Γράψε τις απαντήσεις και πάτα Έλεγχος</div>
    <button class="btn-check-all" onclick="checkAll()">Έλεγχος ✓</button>
  </div>
</div>

<!-- VOCAB PAGE -->
<div id="page-vocab" class="page">
  <div class="vocab-search">
    <input type="search" placeholder="Αναζήτηση..." id="vsearch" oninput="renderVocab()" />
  </div>
  <div class="table-wrap">
    <table class="vocab-tbl">
      <thead><tr><th>#</th><th>Ιταλικά</th><th>Ελληνικά</th></tr></thead>
      <tbody id="vocab-body"></tbody>
    </table>
  </div>
</div>

<!-- STATS PAGE -->
<div id="page-stats" class="page">
  <div class="stats-wrap">
    <div class="stats-grid">
      <div class="stat-card"><div class="val" id="st-total">—</div><div class="lbl">Συνολικές απαντήσεις</div></div>
      <div class="stat-card"><div class="val" id="st-pct">—</div><div class="lbl">Ποσοστό επιτυχίας</div></div>
      <div class="stat-card"><div class="val" id="st-sessions">0</div><div class="lbl">Συνεδρίες</div></div>
      <div class="stat-card"><div class="val" id="st-best">—</div><div class="lbl">Καλύτερο σκορ</div></div>
    </div>
    <div class="hist-card">
      <h3>Ιστορικό</h3>
      <ul class="hist-list" id="hist-list"><li style="color:var(--text2)">Δεν υπάρχουν ακόμα συνεδρίες.</li></ul>
    </div>
    <button onclick="clearStats()" style="margin-top:12px;width:100%;padding:10px;border-radius:var(--radius);border:0.5px solid var(--red-border);color:var(--red-border);background:none;cursor:pointer;font-size:13px;">Εκκαθάριση στατιστικών</button>
  </div>
</div>

  {it:"tradurre",gr:"μεταφράζω"},{it:"giungere",gr:"φτάνω"},{it:"piangere",gr:"κλαίω"},
  {it:"spegnere",gr:"σβήνω"},{it:"chiedere",gr:"ζητώ - ρωτώ"},{it:"porre",gr:"θέτω - τοποθετώ"},
  {it:"rispondere",gr:"απαντώ"},{it:"vincere",gr:"κερδίζω"},{it:"mungere",gr:"αρμέγω"},
  {it:"scegliere",gr:"επιλέγω"},{it:"commuovere",gr:"συγκινώ"},{it:"rivolgere",gr:"απευθύνω"},
  {it:"coprire",gr:"καλύπτω"},{it:"offrire",gr:"προσφέρω"},{it:"comparire",gr:"εμφανίζομαι"},
  {it:"perdere",gr:"χάνω"},{it:"vivere",gr:"ζω"},{it:"bere",gr:"πίνω"},
  {it:"persuadere",gr:"πείθω"}
];

let direction = 'gr'; // 'gr' = it→gr, 'it' = gr→it

function norm(s) {
  return s.toLowerCase()
    .replace(/[αά]/g,'α').replace(/[εέ]/g,'ε').replace(/[ηή]/g,'η')
    .replace(/[ιίϊΐ]/g,'ι').replace(/[οό]/g,'ο').replace(/[υύϋΰ]/g,'υ').replace(/[ωώ]/g,'ω')
    .replace(/[àáâ]/g,'a').replace(/[èéê]/g,'e').replace(/[ìíî]/g,'i')
    .replace(/[òóô]/g,'o').replace(/[ùúû]/g,'u')
    .replace(/\s*-\s*/g,' - ').trim();
}
function isCorrect(input, correct) {
  const n = norm(input);
  return correct.split('-').map(p => norm(p.trim())).some(p => p === n) ||
         norm(correct) === n;
}

function setDir(d) {
  direction = d;
  document.getElementById('dir-gr').classList.toggle('active', d==='gr');
  document.getElementById('dir-it').classList.toggle('active', d==='it');
  document.getElementById('col-q').textContent = d==='gr' ? 'Ιταλικά' : 'Ελληνικά';
  document.getElementById('col-a').textContent = d==='gr' ? 'Απάντηση (Ελληνικά)' : 'Απάντηση (Ιταλικά)';
  renderQuiz();
}

function renderQuiz() {
  const tbody = document.getElementById('quiz-body');
  tbody.innerHTML = vocab.map((v,i) => {
    const q = direction==='gr' ? v.it : v.gr;
    return `<tr>
      <td class="row-num">${i+1}</td>
      <td class="it-word">${q}</td>
      <td><input class="answer-inp" id="inp-${i}" type="text" autocomplete="off" autocorrect="off" spellcheck="false" onkeydown="handleKey(event,${i})" /></td>
      <td class="check-cell" id="chk-${i}"></td>
    </tr>`;
  }).join('');
  updateHeader(0,0);
}

function handleKey(e, i) {
  if (e.key === 'Enter') {
    e.preventDefault();
    const next = document.getElementById('inp-'+(i+1));
    if (next) next.focus();
  }
}

function checkAll() {
  let ok = 0, ko = 0;
  vocab.forEach((v,i) => {
    const inp = document.getElementById('inp-'+i);
    const val = inp.value.trim();
    if (!val) { inp.classList.remove('correct','wrong'); document.getElementById('chk-'+i).textContent=''; return; }
    const correct = direction==='gr' ? v.gr : v.it;
    if (isCorrect(val, correct)) {
      inp.classList.add('correct'); inp.classList.remove('wrong');
      document.getElementById('chk-'+i).textContent = '✓';
      ok++;
    } else {
      inp.classList.add('wrong'); inp.classList.remove('correct');
      document.getElementById('chk-'+i).textContent = '✗';
      ko++;
    }
  });
  updateHeader(ok, ko);
  saveSession(ok, ko);
  document.getElementById('bottom-info').textContent = `${ok} σωστά · ${ko} λάθη · ${vocab.length - ok - ko} κενά`;
}

function updateHeader(ok, ko) {
  document.getElementById('hdr-ok').textContent = ok;
  document.getElementById('hdr-ko').textContent = ko;
  const total = ok + ko;
  document.getElementById('hdr-pct').textContent = total > 0 ? Math.round(ok/total*100)+'%' : '—';
}

function resetQuiz() {
  vocab.forEach((_,i) => {
    const inp = document.getElementById('inp-'+i);
    inp.value = ''; inp.classList.remove('correct','wrong');
    document.getElementById('chk-'+i).textContent = '';
  });
  updateHeader(0,0);
  document.getElementById('bottom-info').textContent = 'Γράψε τις απαντήσεις και πάτα Έλεγχος';
  document.getElementById('inp-0')?.focus();
}

// VOCAB
function renderVocab() {
  const q = (document.getElementById('vsearch')?.value||'').toLowerCase();
  document.getElementById('vocab-body').innerHTML = vocab
    .filter(v => !q || v.it.toLowerCase().includes(q) || v.gr.toLowerCase().includes(q))
    .map((v,i) => `<tr><td style="font-size:11px;color:var(--text2);text-align:center;">${i+1}</td><td style="font-weight:500">${v.it}</td><td>${v.gr}</td></tr>`)
    .join('');
}

// STATS
function loadStats() {
  try { return JSON.parse(localStorage.getItem('it_stats')||'{"total":0,"correct":0,"sessions":[]}'); }
  catch(e) { return {total:0,correct:0,sessions:[]}; }
}
function saveSession(ok, ko) {
  if (ok+ko === 0) return;
  const s = loadStats();
  s.total += ok+ko; s.correct += ok;
  s.sessions.unshift({date:new Date().toLocaleDateString('el-GR'), ok, total:ok+ko, pct:Math.round(ok/(ok+ko)*100)});
  if (s.sessions.length>20) s.sessions.pop();
  localStorage.setItem('it_stats', JSON.stringify(s));
}
function renderStats() {
  const s = loadStats();
  document.getElementById('st-total').textContent = s.total || '—';
  document.getElementById('st-pct').textContent = s.total ? Math.round(s.correct/s.total*100)+'%' : '—';
  document.getElementById('st-sessions').textContent = s.sessions.length;
  const best = s.sessions.length ? Math.max(...s.sessions.map(x=>x.pct)) : null;
  document.getElementById('st-best').textContent = best !== null ? best+'%' : '—';
  const ul = document.getElementById('hist-list');
  ul.innerHTML = s.sessions.length
    ? s.sessions.map(x=>`<li><span>${x.ok}/${x.total} σωστά <span class="hist-date">${x.date}</span></span><span class="pct-badge">${x.pct}%</span></li>`).join('')
    : '<li style="color:var(--text2)">Δεν υπάρχουν ακόμα συνεδρίες.</li>';
}
function clearStats() {
  if(confirm('Να διαγραφούν τα στατιστικά;')) { localStorage.removeItem('it_stats'); renderStats(); }
}

function showPage(p) {
  ['quiz','vocab','stats'].forEach((x,i) => {
    document.getElementById('page-'+x).classList.toggle('active', x===p);
    document.querySelectorAll('.tab-btn')[i].classList.toggle('active', x===p);
  });
  if(p==='vocab') renderVocab();
  if(p==='stats') renderStats();
}

// Init
renderQuiz();
renderVocab();

if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
</body>
