<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Ιταλικό Λεξιλόγιο</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#533fb7" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Italiano" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #ffffff; --bg2: #f5f5f3; --bg3: #ededea;
      --text: #1a1a18; --text2: #6b6b67;
      --border: rgba(0,0,0,0.1); --border2: rgba(0,0,0,0.2);
      --accent: #533fb7; --accent-light: #eeedfe;
      --green-bg: #e1f5ee; --green-text: #085041; --green-border: #1D9E75;
      --red-bg: #fcebeb; --red-text: #501313; --red-border: #e24b4a;
      --radius: 10px; --radius-lg: 14px;
      --tap: 48px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1c1c1a; --bg2: #252523; --bg3: #2f2f2c;
        --text: #f0ede8; --text2: #9a9a94;
        --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.18);
        --accent-light: #26215c;
        --green-bg: #04342c; --green-text: #9fe1cb;
        --red-bg: #501313; --red-text: #f7c1c1;
      }
    }

    html { font-size: 16px; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg2); color: var(--text);
      min-height: 100vh; min-height: 100dvh;
      -webkit-text-size-adjust: 100%;
    }

    /* HEADER */
    header {
      background: var(--bg); border-bottom: 0.5px solid var(--border2);
      padding: 14px 16px; position: sticky; top: 0; z-index: 20;
      display: flex; align-items: center; justify-content: space-between; gap: 10px;
    }
    header h1 { font-size: 17px; font-weight: 700; }
    .score-pills { display: flex; gap: 6px; }
    .pill {
      font-size: 13px; padding: 4px 12px; border-radius: 999px;
      border: 0.5px solid var(--border2); color: var(--text2); background: var(--bg2);
    }
    .pill b { color: var(--text); font-weight: 700; }
    .pill.green { background: var(--green-bg); color: var(--green-text); border-color: var(--green-border); }
    .pill.red { background: var(--red-bg); color: var(--red-text); border-color: var(--red-border); }

    /* TABS */
    .tabs { display: flex; background: var(--bg); border-bottom: 0.5px solid var(--border2); }
    .tab-btn {
      flex: 1; padding: 13px 0; font-size: 14px; font-weight: 500;
      border: none; background: none; color: var(--text2); cursor: pointer;
      border-bottom: 2.5px solid transparent; min-height: var(--tap);
    }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* TOOLBAR */
    .toolbar {
      background: var(--bg); border-bottom: 0.5px solid var(--border);
      padding: 10px 12px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
    }
    .dir-btn {
      font-size: 14px; padding: 8px 16px; border-radius: 999px;
      border: 0.5px solid var(--border2); background: var(--bg2);
      color: var(--text2); cursor: pointer; min-height: var(--tap);
      display: flex; align-items: center;
    }
    .dir-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .toolbar-sep { flex: 1; }
    .btn-reset {
      font-size: 13px; padding: 8px 14px; border-radius: 999px;
      border: 0.5px solid var(--red-border); color: var(--red-border);
      background: none; cursor: pointer; min-height: var(--tap);
      display: flex; align-items: center;
    }

    /* CAT FILTER */
    .cat-filter {
      background: var(--bg); border-bottom: 0.5px solid var(--border);
      padding: 10px 12px; display: flex; gap: 8px; flex-wrap: wrap;
    }
    .cat-btn {
      font-size: 13px; padding: 7px 14px; border-radius: 999px;
      border: 0.5px solid var(--border); background: var(--bg2);
      color: var(--text2); cursor: pointer; min-height: 36px;
    }
    .cat-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    .page { display: none; }
    .page.active { display: block; }

    /* QUIZ TABLE — mobile optimized */
    .table-wrap { overflow-x: hidden; width: 100%; }
    table.quiz-tbl { width: 100%; border-collapse: collapse; table-layout: fixed; }
    table.quiz-tbl col.c-num  { width: 36px; }
    table.quiz-tbl col.c-word { width: 38%; }
    table.quiz-tbl col.c-ans  { width: auto; }
    table.quiz-tbl col.c-chk  { width: 32px; }

    table.quiz-tbl th {
      background: var(--bg); font-size: 12px; font-weight: 600;
      text-transform: uppercase; letter-spacing: .4px; color: var(--text2);
      padding: 9px 8px; border-bottom: 1px solid var(--border2); text-align: left;
      position: sticky; top: 0; z-index: 5;
    }
    table.quiz-tbl td { padding: 3px 4px; border-bottom: 0.5px solid var(--border); vertical-align: middle; }

    .cat-sep td {
      background: var(--bg3) !important; font-size: 11px; font-weight: 700;
      color: var(--accent); text-transform: uppercase; letter-spacing: .6px;
      padding: 7px 8px; border-bottom: 1px solid var(--border2);
    }

    .it-word {
      font-size: 15px; font-weight: 500; color: var(--text);
      padding: 6px 6px 6px 8px; line-height: 1.3;
      word-break: break-word;
    }
    .row-num { font-size: 11px; color: var(--text2); text-align: center; }

    .answer-inp {
      width: 100%; font-size: 16px; padding: 8px 8px;
      border: 1px solid transparent; border-radius: var(--radius);
      background: transparent; color: var(--text); outline: none;
      min-height: var(--tap); -webkit-appearance: none;
    }
    .answer-inp:focus { border-color: var(--accent); background: var(--bg); }
    .answer-inp.correct { background: var(--green-bg); color: var(--green-text); border-color: var(--green-border); }
    .answer-inp.wrong   { background: var(--red-bg);   color: var(--red-text);   border-color: var(--red-border); }

    .check-cell { text-align: center; font-size: 17px; }

    /* BOTTOM BAR */
    .bottom-bar {
      position: sticky; bottom: 0; background: var(--bg);
      border-top: 0.5px solid var(--border2);
      padding: 12px 16px; padding-bottom: max(12px, env(safe-area-inset-bottom));
      display: flex; gap: 10px; align-items: center;
    }
    .bottom-info { font-size: 13px; color: var(--text2); flex: 1; }
    .btn-check-all {
      padding: 12px 24px; font-size: 15px; font-weight: 700;
      background: var(--accent); color: #fff; border: none;
      border-radius: var(--radius); cursor: pointer; min-height: var(--tap);
      flex-shrink: 0;
    }

    /* VOCAB PAGE */
    .vocab-search { padding: 12px; background: var(--bg); border-bottom: 0.5px solid var(--border); }
    .vocab-search input {
      width: 100%; font-size: 16px; padding: 10px 14px;
      border: 1px solid var(--border2); border-radius: var(--radius);
      background: var(--bg2); color: var(--text); outline: none;
      -webkit-appearance: none; min-height: var(--tap);
    }
    .vocab-search input:focus { border-color: var(--accent); }

    table.vocab-tbl { width: 100%; border-collapse: collapse; table-layout: fixed; }
    table.vocab-tbl col.vc-num  { width: 36px; }
    table.vocab-tbl col.vc-it   { width: 42%; }
    table.vocab-tbl col.vc-gr   { width: auto; }
    table.vocab-tbl th {
      font-size: 12px; font-weight: 600; text-transform: uppercase;
      letter-spacing: .4px; color: var(--text2); padding: 9px 10px;
      border-bottom: 1px solid var(--border2); text-align: left;
      background: var(--bg); position: sticky; top: 0; z-index: 5;
    }
    table.vocab-tbl td { padding: 9px 10px; border-bottom: 0.5px solid var(--border); font-size: 15px; line-height: 1.4; word-break: break-word; }
    table.vocab-tbl .cat-sep td { background: var(--bg3) !important; font-size: 11px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: .6px; padding: 6px 10px; }
    .badge { font-size: 11px; padding: 2px 8px; border-radius: 999px; background: var(--accent-light); color: var(--accent); }

    /* STATS */
    .stats-wrap { padding: 14px; }
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
    .stat-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 16px; text-align: center; }
    .stat-card .val { font-size: 30px; font-weight: 700; color: var(--accent); }
    .stat-card .lbl { font-size: 13px; color: var(--text2); margin-top: 4px; }
    .hist-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 14px; }
    .hist-card h3 { font-size: 14px; font-weight: 600; color: var(--text2); margin-bottom: 12px; }
    .hist-list { list-style: none; }
    .hist-list li { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 0.5px solid var(--border); font-size: 14px; }
    .hist-list li:last-child { border-bottom: none; }
    .hist-date { color: var(--text2); font-size: 12px; margin-left: 6px; }
    .pct-badge { font-size: 13px; padding: 3px 12px; border-radius: 999px; background: var(--accent-light); color: var(--accent); font-weight: 700; }
  </style>
</head>
<body>

<header>
  <h1>🇮🇹 Italiano</h1>
  <div class="score-pills">
    <div class="pill green">✓ <b id="hdr-ok">0</b></div>
    <div class="pill red">✗ <b id="hdr-ko">0</b></div>
    <div class="pill"><b id="hdr-pct">—</b></div>
  </div>
</header>

<div class="tabs">
  <button class="tab-btn active" onclick="showPage('quiz')">Άσκηση</button>
  <button class="tab-btn" onclick="showPage('vocab')">Λεξιλόγιο</button>
  <button class="tab-btn" onclick="showPage('stats')">Στατιστικά</button>
</div>

<!-- QUIZ -->
<div id="page-quiz" class="page active">
  <div class="toolbar">
    <button class="dir-btn active" id="dir-gr" onclick="setDir('gr')">🇮🇹→🇬🇷</button>
    <button class="dir-btn" id="dir-it" onclick="setDir('it')">🇬🇷→🇮🇹</button>
    <div class="toolbar-sep"></div>
    <button class="btn-reset" onclick="resetQuiz()">↺ Καθαρισμός</button>
  </div>
  <div class="cat-filter" id="quiz-cat-filter"></div>
  <div class="table-wrap">
    <table class="quiz-tbl">
      <colgroup>
        <col class="c-num"><col class="c-word"><col class="c-ans"><col class="c-chk">
      </colgroup>
      <thead><tr>
        <th></th>
        <th id="col-q">Ιταλικά</th>
        <th id="col-a">Ελληνικά</th>
        <th></th>
      </tr></thead>
      <tbody id="quiz-body"></tbody>
    </table>
  </div>
  <div class="bottom-bar">
    <div class="bottom-info" id="bottom-info">Γράψε και πάτα Έλεγχος</div>
    <button class="btn-check-all" onclick="checkAll()">Έλεγχος ✓</button>
  </div>
</div>

<!-- VOCAB -->
<div id="page-vocab" class="page">
  <div class="vocab-search">
    <input type="search" placeholder="🔍 Αναζήτηση..." id="vsearch" oninput="renderVocab()" />
  </div>
  <div class="table-wrap">
    <table class="vocab-tbl">
      <colgroup><col class="vc-num"><col class="vc-it"><col class="vc-gr"></colgroup>
      <thead><tr><th>#</th><th>Ιταλικά</th><th>Ελληνικά</th></tr></thead>
      <tbody id="vocab-body"></tbody>
    </table>
  </div>
</div>

<!-- STATS -->
<div id="page-stats" class="page">
  <div class="stats-wrap">
    <div class="stats-grid">
      <div class="stat-card"><div class="val" id="st-total">—</div><div class="lbl">Απαντήσεις</div></div>
      <div class="stat-card"><div class="val" id="st-pct">—</div><div class="lbl">Επιτυχία</div></div>
      <div class="stat-card"><div class="val" id="st-sessions">0</div><div class="lbl">Συνεδρίες</div></div>
      <div class="stat-card"><div class="val" id="st-best">—</div><div class="lbl">Καλύτερο</div></div>
    </div>
    <div class="hist-card">
      <h3>Ιστορικό συνεδριών</h3>
      <ul class="hist-list" id="hist-list"><li style="color:var(--text2)">Δεν υπάρχουν ακόμα.</li></ul>
    </div>
    <button onclick="clearStats()" style="margin-top:12px;width:100%;padding:13px;border-radius:var(--radius);border:0.5px solid var(--red-border);color:var(--red-border);background:none;cursor:pointer;font-size:14px;">Εκκαθάριση στατιστικών</button>
  </div>
</div>

let direction = 'gr';
let activeCat = 'all';
const cats = ['all', ...new Set(vocab.map(v => v.cat))];

function normGr(s) {
  return s.toLowerCase()
    .replace(/[αά]/g,'α').replace(/[εέ]/g,'ε').replace(/[ηή]/g,'η')
    .replace(/[ιίϊΐ]/g,'ι').replace(/[οό]/g,'ο').replace(/[υύϋΰ]/g,'υ')
    .replace(/[ωώ]/g,'ω').trim();
}
function normIt(s) {
  return s.toLowerCase()
    .replace(/[àáâ]/g,'a').replace(/[èéê]/g,'e').replace(/[ìíî]/g,'i')
    .replace(/[òóô]/g,'o').replace(/[ùúû]/g,'u').trim();
}
function normAll(s) { return normGr(normIt(s)); }

function isCorrect(input, correct) {
  const ni = normAll(input);
  if (!ni) return false;
  if (normAll(correct) === ni) return true;
  return correct.split(' - ').map(v => normAll(v.trim())).some(v => v === ni);
}

function filteredVocab() {
  return activeCat === 'all' ? vocab : vocab.filter(v => v.cat === activeCat);
}

function buildCatFilter() {
  document.getElementById('quiz-cat-filter').innerHTML = cats.map(c =>
    `<button class="cat-btn${c==='all'?' active':''}" onclick="setCat('${c}')">${c==='all'?'Όλες':c}</button>`
  ).join('');
}

function setCat(c) {
  activeCat = c;
  document.querySelectorAll('.cat-btn').forEach(b =>
    b.classList.toggle('active', b.textContent === (c==='all'?'Όλες':c))
  );
  renderQuiz();
}

function setDir(d) {
  direction = d;
  document.getElementById('dir-gr').classList.toggle('active', d==='gr');
  document.getElementById('dir-it').classList.toggle('active', d==='it');
  document.getElementById('col-q').textContent = d==='gr' ? 'Ιταλικά' : 'Ελληνικά';
  document.getElementById('col-a').textContent = d==='gr' ? 'Ελληνικά' : 'Ιταλικά';
  renderQuiz();
}

function renderQuiz() {
  const fv = filteredVocab();
  let html = '', lastCat = null, num = 0;
  fv.forEach((v, i) => {
    if (v.cat !== lastCat) {
      html += `<tr class="cat-sep"><td colspan="4">${v.cat}</td></tr>`;
      lastCat = v.cat;
    }
    num++;
    const q = direction==='gr' ? v.it : v.gr;
    html += `<tr>
      <td class="row-num">${num}</td>
      <td class="it-word">${q}</td>
      <td><input class="answer-inp" id="inp-${i}" type="text"
        autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
        inputmode="text"
        onkeydown="if(event.key==='Enter'){event.preventDefault();nextInput(${i},${JSON.stringify(fv.map((_,j)=>j))})}" /></td>
      <td class="check-cell" id="chk-${i}"></td>
    </tr>`;
  });
  document.getElementById('quiz-body').innerHTML = html;
  document.getElementById('bottom-info').textContent = fv.length + ' λέξεις';
  updateHeader(0,0);
}

function nextInput(cur, idxList) {
  const pos = idxList.indexOf(cur);
  if (pos < idxList.length-1) document.getElementById('inp-'+idxList[pos+1])?.focus();
}

function checkAll() {
  const fv = filteredVocab();
  let ok=0, ko=0, empty=0;
  fv.forEach((v,i) => {
    const inp = document.getElementById('inp-'+i);
    if (!inp) return;
    const val = inp.value.trim();
    if (!val) { inp.classList.remove('correct','wrong'); document.getElementById('chk-'+i).textContent=''; empty++; return; }
    const correct = direction==='gr' ? v.gr : v.it;
    if (isCorrect(val, correct)) {
      inp.classList.add('correct'); inp.classList.remove('wrong');
      document.getElementById('chk-'+i).textContent='✓'; ok++;
    } else {
      inp.classList.add('wrong'); inp.classList.remove('correct');
      document.getElementById('chk-'+i).textContent='✗'; ko++;
    }
  });
  updateHeader(ok,ko);
  if(ok+ko>0) saveSession(ok,ko);
  document.getElementById('bottom-info').textContent = `✓${ok} ✗${ko} κενά:${empty}`;
}

function updateHeader(ok,ko) {
  document.getElementById('hdr-ok').textContent=ok;
  document.getElementById('hdr-ko').textContent=ko;
  const t=ok+ko;
  document.getElementById('hdr-pct').textContent=t>0?Math.round(ok/t*100)+'%':'—';
}

function resetQuiz() {
  filteredVocab().forEach((_,i) => {
    const inp=document.getElementById('inp-'+i);
    if(!inp) return;
    inp.value=''; inp.classList.remove('correct','wrong');
    document.getElementById('chk-'+i).textContent='';
  });
  updateHeader(0,0);
  document.getElementById('bottom-info').textContent=filteredVocab().length+' λέξεις';
}

function renderVocab() {
  const q=(document.getElementById('vsearch')?.value||'').toLowerCase();
  let html='', lastCat=null, num=0;
  vocab.filter(v=>!q||v.it.toLowerCase().includes(q)||v.gr.toLowerCase().includes(q))
    .forEach(v=>{
      if(!q && v.cat!==lastCat){
        html+=`<tr class="cat-sep"><td colspan="3">${v.cat}</td></tr>`;
        lastCat=v.cat;
      }
      num++;
      html+=`<tr><td style="font-size:12px;color:var(--text2);text-align:center">${num}</td><td style="font-weight:500">${v.it}</td><td>${v.gr}</td></tr>`;
    });
  document.getElementById('vocab-body').innerHTML=html;
}

function loadStats(){try{return JSON.parse(localStorage.getItem('it_stats')||'{"total":0,"correct":0,"sessions":[]}')}catch(e){return{total:0,correct:0,sessions:[]}}}
function saveSession(ok,ko){
  const s=loadStats();
  s.total+=ok+ko;s.correct+=ok;
  s.sessions.unshift({date:new Date().toLocaleDateString('el-GR'),ok,total:ok+ko,pct:Math.round(ok/(ok+ko)*100)});
  if(s.sessions.length>20)s.sessions.pop();
  localStorage.setItem('it_stats',JSON.stringify(s));
}
function renderStats(){
  const s=loadStats();
  document.getElementById('st-total').textContent=s.total||'—';
  document.getElementById('st-pct').textContent=s.total?Math.round(s.correct/s.total*100)+'%':'—';
  document.getElementById('st-sessions').textContent=s.sessions.length;
  const best=s.sessions.length?Math.max(...s.sessions.map(x=>x.pct)):null;
  document.getElementById('st-best').textContent=best!==null?best+'%':'—';
  const ul=document.getElementById('hist-list');
  ul.innerHTML=s.sessions.length
    ?s.sessions.map(x=>`<li><span>${x.ok}/${x.total} σωστά <span class="hist-date">${x.date}</span></span><span class="pct-badge">${x.pct}%</span></li>`).join('')
    :'<li style="color:var(--text2)">Δεν υπάρχουν ακόμα.</li>';
}
function clearStats(){if(confirm('Να διαγραφούν τα στατιστικά;')){localStorage.removeItem('it_stats');renderStats();}}

function showPage(p){
  ['quiz','vocab','stats'].forEach((x,i)=>{
    document.getElementById('page-'+x).classList.toggle('active',x===p);
    document.querySelectorAll('.tab-btn')[i].classList.toggle('active',x===p);
  });
  if(p==='vocab')renderVocab();
  if(p==='stats')renderStats();
}

buildCatFilter();
renderQuiz();
renderVocab();
if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
